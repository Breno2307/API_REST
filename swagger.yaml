openapi: 3.0.0
info:
  title: Petshop API
  version: 1.0.0
  description: API para gerenciamento de petshop - Agendamentos, Produtos e Usuários
  contact:
    name: Equipe Petshop
    email: suporte@petshop.com

servers:
  - url: http://localhost:5000
    description: Servidor de Desenvolvimento
  - url: https://api.petshop.com
    description: Servidor de Produção

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    Login:
      type: object
      required:
        - email
        - senha
      properties:
        email:
          type: string
          format: email
          example: usuario@email.com
        senha:
          type: string
          format: password
          example: senha123
    
    Token:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        tipo:
          type: string
          example: "Bearer"
    
    Usuario:
      type: object
      required:
        - nome
        - email
        - senha
        - tipo
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          format: email
          example: "joao@email.com"
        senha:
          type: string
          format: password
          example: "senha123"
        telefone:
          type: string
          example: "(11) 99999-9999"
        tipo:
          type: string
          enum: [cliente, admin, funcionario]
          example: "cliente"
        criado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        atualizado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
    
    UsuarioInput:
      type: object
      required:
        - nome
        - email
        - senha
        - tipo
      properties:
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          format: email
          example: "joao@email.com"
        senha:
          type: string
          format: password
          example: "senha123"
        telefone:
          type: string
          example: "(11) 99999-9999"
        tipo:
          type: string
          enum: [cliente, admin, funcionario]
          example: "cliente"
    
    Produto:
      type: object
      required:
        - nome
        - preco
        - categoria
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Ração Premium para Cães"
        descricao:
          type: string
          example: "Ração de alta qualidade para cães adultos"
        preco:
          type: number
          format: float
          example: 89.90
        categoria:
          type: string
          enum: [racao, medicamento, brinquedo, higiene, acessorio]
          example: "racao"
        estoque:
          type: integer
          example: 50
        imagem:
          type: string
          example: "https://exemplo.com/imagem.jpg"
        criado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        atualizado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
    
    ProdutoInput:
      type: object
      required:
        - nome
        - preco
        - categoria
      properties:
        nome:
          type: string
          example: "Ração Premium para Cães"
        descricao:
          type: string
          example: "Ração de alta qualidade para cães adultos"
        preco:
          type: number
          format: float
          example: 89.90
        categoria:
          type: string
          enum: [racao, medicamento, brinquedo, higiene, acessorio]
          example: "racao"
        estoque:
          type: integer
          example: 50
        imagem:
          type: string
          example: "https://exemplo.com/imagem.jpg"
    
    Agendamento:
      type: object
      required:
        - usuario_id
        - servico
        - data_agendamento
        - animal
      properties:
        id:
          type: integer
          example: 1
        usuario_id:
          type: integer
          example: 1
        servico:
          type: string
          enum: [banho, tosa, consulta, vacinacao, banho_tosa]
          example: "banho_tosa"
        data_agendamento:
          type: string
          format: date-time
          example: "2024-01-20T14:30:00Z"
        animal:
          type: string
          example: "Rex"
        especie:
          type: string
          enum: [cachorro, gato, outro]
          example: "cachorro"
        observacoes:
          type: string
          example: "Cão de porte grande, cuidado com as orelhas"
        status:
          type: string
          enum: [agendado, confirmado, realizado, cancelado]
          example: "agendado"
        criado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        atualizado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
    
    AgendamentoInput:
      type: object
      required:
        - servico
        - data_agendamento
        - animal
      properties:
        servico:
          type: string
          enum: [banho, tosa, consulta, vacinacao, banho_tosa]
          example: "banho_tosa"
        data_agendamento:
          type: string
          format: date-time
          example: "2024-01-20T14:30:00Z"
        animal:
          type: string
          example: "Rex"
        especie:
          type: string
          enum: [cachorro, gato, outro]
          example: "cachorro"
        observacoes:
          type: string
          example: "Cão de porte grande, cuidado com as orelhas"
    
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Mensagem de erro"
        code:
          type: integer
          example: 400
        details:
          type: string
          example: "Detalhes adicionais do erro"

paths:
  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Login de usuário
      description: Autentica um usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erro interno do servidor

  /usuarios:
    get:
      tags:
        - Usuários
      summary: Listar todos os usuários
      description: Retorna lista de todos os usuários (requer autenticação admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '401':
          description: Não autorizado
        '500':
          description: Erro interno do servidor
    
    post:
      tags:
        - Usuários
      summary: Criar novo usuário
      description: Cria um novo usuário no sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Dados inválidos
        '409':
          description: Email já cadastrado
        '500':
          description: Erro interno do servidor

  /usuarios/{id}:
    get:
      tags:
        - Usuários
      summary: Buscar usuário por ID
      description: Retorna um usuário específico pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          description: Usuário não encontrado
        '401':
          description: Não autorizado
    
    put:
      tags:
        - Usuários
      summary: Atualizar usuário
      description: Atualiza os dados de um usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '200':
          description: Usuário atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Dados inválidos
        '404':
          description: Usuário não encontrado
        '401':
          description: Não autorizado
    
    delete:
      tags:
        - Usuários
      summary: Deletar usuário
      description: Remove um usuário do sistema
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Usuário deletado com sucesso
        '404':
          description: Usuário não encontrado
        '401':
          description: Não autorizado
  /produtos:
    get:
      tags:
        - Produtos
      summary: Listar todos os produtos
      description: Retorna lista de todos os produtos
      responses:
        '200':
          description: Lista de produtos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Produto'
        '500':
          description: Erro interno do servidor
    
    post:
      tags:
        - Produtos
      summary: Criar novo produto
      description: Cria um novo produto no sistema (requer autenticação admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProdutoInput'
      responses:
        '201':
          description: Produto criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Produto'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
  /produtos/{id}:
    get:
      tags:
        - Produtos
      summary: Buscar produto por ID
      description: Retorna um produto específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Produto'
        '404':
          description: Produto não encontrado
    
    put:
      tags:
        - Produtos
      summary: Atualizar produto
      description: Atualiza os dados de um produto (requer autenticação admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProdutoInput'
      responses:
        '200':
          description: Produto atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Produto'
        '400':
          description: Dados inválidos
        '404':
          description: Produto não encontrado
        '401':
          description: Não autorizado
    
    delete:
      tags:
        - Produtos
      summary: Deletar produto
      description: Remove um produto do sistema (requer autenticação admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Produto deletado com sucesso
        '404':
          description: Produto não encontrado
        '401':
          description: Não autorizado
  /agenda:
    get:
      tags:
        - Agenda
      summary: Listar agendamentos
      description: Retorna lista de agendamentos (filtrado por usuário para clientes)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de agendamentos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agendamento'
        '401':
          description: Não autorizado
        '500':
          description: Erro interno do servidor
    
    post:
      tags:
        - Agenda
      summary: Criar novo agendamento
      description: Cria um novo agendamento no sistema
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendamentoInput'
      responses:
        '201':
          description: Agendamento criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agendamento'
        '400':
          description: Dados inválidos ou horário indisponível
        '401':
          description: Não autorizado

  /agenda/{id}:
    get:
      tags:
        - Agenda
      summary: Buscar agendamento por ID
      description: Retorna um agendamento específico pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Agendamento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agendamento'
        '404':
          description: Agendamento não encontrado
        '401':
          description: Não autorizado
    
    put:
      tags:
        - Agenda
      summary: Atualizar agendamento
      description: Atualiza os dados de um agendamento
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendamentoInput'
      responses:
        '200':
          description: Agendamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agendamento'
        '400':
          description: Dados inválidos
        '404':
          description: Agendamento não encontrado
        '401':
          description: Não autorizado
    
    delete:
      tags:
        - Agenda
      summary: Cancelar agendamento
      description: Remove um agendamento do sistema
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Agendamento cancelado com sucesso
        '404':
          description: Agendamento não encontrado
        '401':
          description: Não autorizado

tags:
  - name: Autenticação
    description: Endpoints de autenticação e login
  - name: Usuários
    description: Gerenciamento de usuários do sistema
  - name: Produtos
    description: Gerenciamento de produtos do petshop
  - name: Agenda
    description: Agendamento de serviços para pets